name = "jackrabbit-terminal"
main = "index.js"
compatibility_date = "2024-09-23"

# ── Local development ────────────────────────────────────────────────────────
#
# 1. Create worker/.dev.vars (git-ignored, never commit it):
#
#       ANTHROPIC_API_KEY=sk-ant-...
#
# 2. Start the local Worker:
#       wrangler dev
#
# 3. In terminal.html, temporarily set:
#       const WORKER_URL = 'http://localhost:8787';
#
# 4. Serve the site locally (from repo root):
#       npx serve .
#
# ── Deployment ───────────────────────────────────────────────────────────────
#
# 1. Sign up at cloudflare.com (free, no credit card needed for Workers)
#
# 2. Install Wrangler (requires Node.js):
#       npm install -g wrangler
#
# 3. Log in to Cloudflare:
#       wrangler login
#
# 4. Set your Anthropic API key as a Cloudflare secret (never put it in this file):
#       wrangler secret put ANTHROPIC_API_KEY
#
# 5. Deploy:
#       wrangler deploy
#
# 6. Wrangler will print your Worker URL, e.g.:
#       https://jackrabbit-terminal.<your-subdomain>.workers.dev
#
# 7. Paste that URL into terminal.html where WORKER_URL is defined.
#
# ── Free tier limits ─────────────────────────────────────────────────────────
# Cloudflare Workers free tier: 100,000 requests/day — more than enough
# for a fan site. No credit card required.
