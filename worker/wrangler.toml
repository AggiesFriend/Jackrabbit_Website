name = "jackrabbit-terminal"
main = "index.js"
compatibility_date = "2024-09-23"

# ── Deployment ──────────────────────────────────────────────────────────────
#
# 1. Install Wrangler (requires Node.js):
#       npm install -g wrangler
#
# 2. Log in to Cloudflare:
#       wrangler login
#
# 3. Set your Anthropic API key as a secret (never put it in this file):
#       wrangler secret put ANTHROPIC_API_KEY
#
# 4. Deploy:
#       wrangler deploy
#
# 5. Wrangler will print your Worker URL, e.g.:
#       https://jackrabbit-terminal.<your-subdomain>.workers.dev
#
# 6. Paste that URL into terminal.html where WORKER_URL is defined.
#
# ── Free tier limits ─────────────────────────────────────────────────────────
# Cloudflare Workers free tier: 100,000 requests/day — more than enough
# for a fan site. No credit card required.
